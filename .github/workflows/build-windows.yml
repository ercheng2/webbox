name: Build WebBox

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5==5.15.10 PyQtWebEngine==5.15.6 pyinstaller
    
    - name: Build with PyInstaller
      shell: pwsh
      run: |
        @"
        # -*- mode: python ; coding: utf-8 -*-
        from PyInstaller.utils.hooks import collect_all
        
        block_cipher = None
        
        # æŠ•è¢ù`PyQt5æ‰€æœ‰å¸‚åœºäºŽæ–¹
        datas, binaries, hiddenimports = collect_all("PyQt5")
        
        a = Analysis(["main.py"],
                     pathex=[],
                    binaries=binaries,
                    datas=datas + [("webbox_config.json", "."), ("Kunzhancheng.ico", ".")],
                    hiddenimports=hiddenimports,
                    hookpath=[],
                    runtime_hooks=[],
                    excludes=[],
                    cipher=block_cipher)
        
        pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
        
        exe = EXE(pyz, a.scripts, a.binaries, a.zipfiles, a.datas, [],
                  name="WebBox",
                  debug=False,
                  strip=False,
                  upx=True,
                  console=False,
                  icon="Kunzhancheng.ico")
        "@ | Out-File -FilePath "webbox.spec" -Encoding utf8
        
        pyinstaller --clean webbox.spec
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.3
        files: dist/WebBox.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
