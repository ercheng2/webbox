name: Build WebBox

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5==5.15.10 PyQtWebEngine==5.15.6 pyinstaller
    
    - name: Build with PyInstaller (onedir mode)
      shell: pwsh
      run: |
        @"
        # -*- mode: python ; coding: utf-8 -*-
        from PyInstaller.utils.hooks import collect_all
        
        block_cipher = None
        
        # 加衏PyQt5分析PeQtWebEngine市场于它
        pyqt5_datas, pyqt5_binaries, pyqt5_hiddenimports = collect_all("PyQt5")
        webengine_datas, webengine_binaries, webengine_hiddenimports = collect_all("PyQtWebEngine")
        
        # 安全
        all_datas = pyqt5_datas + webengine_datas
        all_binaries = pyqt5_binaries + webengine_binaries
        all_hiddenimports = pyqt5_hiddenimports + webengine_hiddenimports
        
        a = Analysis("main.py",
                     pathex=[],
                    binaries=all_binaries,
                    datas=all_datas + [("webbox_config.json", "."), ("Kunzhancheng.ico", ".")],
                    hiddenimports=all_hiddenimports,
                    hookpath=[],
                    runtime_hooks=[],
                    excludes=[],
                    cipher=block_cipher)
        
        pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
        
        exe = EXE(pyz, a.scripts, [],
                  name="WebBox",
                  debug=False,
                  strip=False,
                  upx=True,
                  console=False,
                  icon="Kunzhancheng.ico")
        
        coll = COLLECT(exe, a.binaries, a.zipfiles, a.datas, [],
                       name="WebBox")
        "@ | Out-File -FilePath "webbox.spec" -Encoding utf8
        
        pyinstaller --clean webbox.spec
    
    - name: Zip the folder
      run: Compress-Archive -Path dist/WebBox -DestinationPath dist/WebBox.zip
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.4
        files: dist/WebBox.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
