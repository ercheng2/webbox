name: Build WebBox

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5==5.15.10 PyQtWebEngine==5.15.6 pyinstaller
    
    - name: Create spec file
      shell: pwsh
      run: |
        @'
        # -*- mode: python ; coding: utf-8 -*-
        from PyInstaller.utils.hooks import collect_data_files, collect_submodules, collect_dynamic_libs
        
        block_cipher = None
        
        hiddenimports = [
            "PyQt5.QtCore",
            "PyQt5.QtGui", 
            "PyQt5.QtWidgets",
            "PyQt5.QtWebEngineWidgets",
            "PyQt5.QtWebEngineCore",
            "PyQt5.QtNetwork",
            "PyQt5.sip",
            "PyQt5.QtWebChannel",
            "PyQt5.QtPrintSupport",
        ]
        
        datas = collect_data_files("PyQt5", include_py_files=False)
        datas += [("webbox_config.json", "."), ("Kunzhancheng.ico", ".")]
        
        binaries = collect_dynamic_libs("PyQt5")
        
        a = Analysis(["main.py"],
                     pathex=[],
                     binaries=binaries,
                     datas=datas,
                     hiddenimports=hiddenimports,
                     hookpath=[],
                     runtime_hooks=[],
                     excludes=[],
                     cipher=block_cipher)
        
        pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
        
        exe = EXE(pyz, a.scripts, [],
                  name="WebBox",
                  debug=False,
                  strip=False,
                  upx=True,
                  console=False,
                  icon="Kunzhancheng.ico")
        
        coll = COLLECT(exe, a.binaries, a.zipfiles, a.datas, [],
                       name="WebBox")
        '@ | Out-File -FilePath "webbox.spec" -Encoding utf8
    
    - name: Build with PyInstaller
      run: pyinstaller --clean webbox.spec
    
    - name: Zip the folder
      run: Compress-Archive -Path dist/WebBox -DestinationPath dist/WebBox.zip
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.0
        files: dist/WebBox.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
