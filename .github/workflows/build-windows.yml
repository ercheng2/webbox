name: Build WebBox

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 PyQtWebEngine pyinstaller
    
    - name: Build EXE with WebEngine
      shell: pwsh
      run: |
        # 创建spec文件
        $specContent = @"
        # -*- mode: python ; coding: utf-8 -*-
        from PyInstaller.utils.hooks import collect_data_files, collect_submodules

        block_cipher = None

        a = Analysis(['main.py'],
                     pathex=[],
                     binaries=[],
                     datas=[('webbox_config.json', '.'), ('Kunzhancheng.ico', '.')],
                     hiddenimports=['PyQt5.QtCore', 'PyQt5.QtGui', 'PyQt5.QtWidgets', 
                                    'PyQt5.QtWebEngineWidgets', 'PyQt5.QtWebEngineCore',
                                    'PyQt5.QtNetwork', 'PyQt5.sip'],
                     hookspath=[],
                     hooksconfig={},
                     runtime_hooks=[],
                     excludes=[],
                     win_no_prefer_redirects=False,
                     win_private_assemblies=False,
                     cipher=block_cipher,
                     noarchive=False)
        
        pyz = PYZ(a.pure, a.zipped_data,
                     cipher=block_cipher)
        
        exe = EXE(pyz,
                  a.scripts,
                  a.binaries,
                  a.zipfiles,
                  a.datas,
                  [],
                  name='WebBox',
                  debug=False,
                  bootloader_ignore_signals=False,
                  strip=False,
                  upx=True,
                  upx_exclude=[],
                  runtime_tmpdir=None,
                  console=False,
                  disable_windowed_traceback=False,
                  argv_emulation=False,
                  target_arch=None,
                  codesign_identity=None,
                  entitlements_file=None,
                  icon='Kunzhancheng.ico')
        "@
        
        $specContent | Out-File -FilePath "webbox.spec" -Encoding utf8
        
        # 运行PyInstaller
        pyinstaller --clean webbox.spec
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.2
        files: dist/WebBox.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
