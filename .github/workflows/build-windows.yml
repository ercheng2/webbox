name: Build WebBox
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install
      run: pip install pywebview pyinstaller
    - name: Build
      run: pyinstaller --onefile --noconsole --name WebBox main.py
    - uses: softprops/action-gh-release@v1
      with:
        tag_name: v3.0
        files: dist/WebBox.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}