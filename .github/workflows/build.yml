name: Build WebBox
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install
      run: pip install pywebview infi.systray pywin32 pyinstaller
    - name: Build
      run: pyinstaller --onefile --noconsole --name WebBox --icon Kunzhancheng.ico main.py
    - name: Get version
      id: version
      run: echo "VERSION=v$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT
    - uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        files: dist/WebBox.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
