name: Build WebBox
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install
      run: pip install pywebview pyinstaller keyboard
    - name: Build
      run: pyinstaller --onefile --noconsole --name WebBox --icon Kunzhancheng.ico main.py
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v3.15-${{ github.run_number }}
        name: "WebBox v3.15 - 内置下载支持"
        body: |
          更新内容：
          - 点击下载链接自动在WebBox内下载
          - 下载文件保存到 Downloads/WebBox 目录
          - 页面内显示下载状态通知
          - 支持exe/zip/pdf/doc/xls/ppt/音视频等格式自动识别
        files: dist/WebBox.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
